<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Agile Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141417">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agile">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 28%),
                linear-gradient(180deg, #1b1b1f 0%, #141417 52%, #101012 100%);
            color: rgba(255, 255, 255, 0.92);
        }

        .bar-blue { background-color: #3b82f6; }
        .bar-green { background-color: #11d86f; }
        .bar-yellow { background-color: #facc15; }
        .bar-orange { background-color: #f97316; }
        .bar-red { background-color: #ef4444; }

        .widget-shell {
            background:
                linear-gradient(180deg, rgba(42, 42, 46, 0.96) 0%, rgba(26, 26, 30, 0.98) 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.14),
                inset 0 -1px 0 rgba(255, 255, 255, 0.03);
        }

        .frost-panel {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.025));
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .widget-shell {
                padding: 0.85rem 1rem;
            }

            .frost-panel {
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="widget-shell relative flex min-h-screen w-full flex-col overflow-hidden px-4 py-4 sm:px-5 sm:py-5">
            <div class="relative z-10 flex items-start justify-between gap-4">
                <div>
                    <div class="text-sm font-medium tracking-[0.18em] text-white/35 uppercase">Octopus Agile Dashboard</div>
                </div>

                <div class="flex shrink-0 gap-2">
                    <button id="refresh-btn" class="action-btn flex h-11 w-11 items-center justify-center rounded-full text-white/72 transition" aria-label="Refresh">
                        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"></path>
                            <path d="M20.49 15a9 9 0 0 1-14.13 3.36L1 14"></path>
                        </svg>
                    </button>
                    <button id="reset-btn" class="action-btn flex h-11 w-11 items-center justify-center rounded-full text-white/52 transition" aria-label="Reset">
                        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 4v1"></path>
                            <path d="M12 19v1"></path>
                            <path d="M4.22 4.22l.7.7"></path>
                            <path d="M18.36 18.36l.7.7"></path>
                            <path d="M1 12h1"></path>
                            <path d="M22 12h1"></path>
                            <path d="M4.22 19.78l.7-.7"></path>
                            <path d="M18.36 5.64l.7-.7"></path>
                            <circle cx="12" cy="12" r="5"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <section class="relative z-10 mt-4 flex-1">
                <div class="frost-panel flex h-full overflow-hidden rounded-[2rem] p-4 sm:p-5 lg:p-6">
                    <div class="flex h-full w-full flex-col gap-4">
                        <div class="grid gap-4 xl:grid-cols-[minmax(0,0.9fr)_minmax(0,1.3fr)] xl:items-stretch">
                            <div>
                                <div class="text-[17px] font-medium tracking-[-0.02em] text-white/58">Current rate</div>
                                <div id="headline-text" class="mt-1 text-[2.75rem] font-semibold leading-none tracking-[-0.06em] text-white sm:text-[4rem]">
                                    Loading live prices...
                                </div>
                            </div>
                            <div>
                                <div class="text-[17px] font-medium tracking-[-0.02em] text-white/58">Cheapest Slot</div>
                                <div class="mt-3 inline-flex max-w-full items-center gap-3 rounded-[1.25rem] border border-white/[0.08] bg-white/[0.06] px-5 py-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)]">
                                    <div id="slot-countdown" class="text-[1.25rem] font-semibold leading-none tracking-[-0.035em] text-white sm:text-[1.45rem]"></div>
                                    <div class="text-white/34">|</div>
                                    <div id="slot-info" class="text-[1.2rem] font-semibold leading-none tracking-[-0.03em] text-white/82 sm:text-[1.35rem]">
                                        Fetching rate data...
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="overflow-hidden rounded-[1.6rem] border border-white/[0.04] bg-black/18 px-4 pb-8 pt-4 sm:px-5">
                            <div id="rate-chart" class="relative mt-1 flex h-[42vh] min-h-[11rem] max-h-[18rem] w-full items-end gap-[3px] border-b border-white/10 pb-8"></div>
                        </div>
                    </div>
                </div>
            </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
