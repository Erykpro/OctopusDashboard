<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octopus Agile Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.8s ease-in-out;
            /* Prevent screen burn-in on Android dashboards by ensuring no harsh white elements */
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        /* Hide scrollbar for dashboard aesthetic */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center text-white overflow-hidden bg-gray-900 font-sans">

    <!-- SETUP VIEW (Hidden if credentials exist) -->
    <div id="setup-view" class="hidden flex-col items-center w-full max-w-sm px-6">
        <h1 class="text-3xl font-bold mb-6 text-center">Agile Dashboard</h1>
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg w-full">
            <label class="block text-sm font-medium mb-2">Octopus API Key</label>
            <input type="text" id="api-key" class="w-full p-3 mb-4 rounded bg-gray-700 text-white border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none shadow-none" placeholder="sk_live_...">
            
            <label class="block text-sm font-medium mb-2">Account Number</label>
            <input type="text" id="account-num" class="w-full p-3 mb-6 rounded bg-gray-700 text-white border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none shadow-none" placeholder="A-12345678">
            
            <button id="save-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors text-shadow-none">
                Save & Start
            </button>
        </div>
        <p class="text-xs text-gray-400 mt-4 text-center">Credentials are stored locally on this device only.</p>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden flex-col justify-center items-center h-full w-full relative">
        
        <div class="flex-grow flex flex-col justify-center items-center">
            <h2 class="text-3xl font-bold mb-2 uppercase tracking-widest opacity-80">Current Rate</h2>
            
            <!-- Hero Price -->
            <div class="flex items-baseline">
                <span id="current-price" class="text-[12rem] font-black leading-none drop-shadow-2xl tracking-tighter">-.-</span>
            </div>
            <div class="text-4xl mt-2 font-bold opacity-90">p/kWh</div>
        </div>

        <!-- Footer Info -->
        <div class="absolute bottom-8 flex flex-col items-center opacity-90 w-full px-4">
            <div class="text-2xl font-medium bg-black/20 px-6 py-3 rounded-full backdrop-blur-sm">
                Next slot (<span id="next-time">--:--</span>): <span id="next-price" class="font-bold">-.-</span> p
            </div>
            <div id="last-updated" class="text-sm font-normal mt-4 opacity-70 tracking-wide">
                Last Updated: --:--
            </div>
            <!-- Clear data button (tiny, bottom right) -->
            <button id="reset-btn" class="absolute right-4 bottom-0 opacity-20 hover:opacity-100 text-xs text-shadow-none">⚙️ Reset</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
