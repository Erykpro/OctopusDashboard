<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Octopus Agile Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            transition: background-color 0.8s ease-in-out;
            /* Prevent screen burn-in on Android dashboards by ensuring no harsh white elements */
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        /* Hide scrollbar for dashboard aesthetic */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-center items-center text-white overflow-hidden bg-gray-900 font-sans">

    <!-- SETUP VIEW (Hidden if credentials exist) -->
    <div id="setup-view" class="hidden flex-col items-center w-full max-w-sm px-6">
        <h1 class="text-3xl font-bold mb-6 text-center">Agile Dashboard</h1>
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg w-full">
            <label class="block text-sm font-medium mb-2">Octopus API Key</label>
            <input type="text" id="api-key" class="w-full p-3 mb-4 rounded bg-gray-700 text-white border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none shadow-none" placeholder="sk_live_...">
            
            <label class="block text-sm font-medium mb-2">Account Number</label>
            <input type="text" id="account-num" class="w-full p-3 mb-6 rounded bg-gray-700 text-white border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none shadow-none" placeholder="A-12345678">
            
            <button id="save-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors text-shadow-none">
                Save & Start
            </button>
        </div>
        <p class="text-xs text-gray-400 mt-4 text-center">Credentials are stored locally on this device only.</p>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden flex-col md:flex-row justify-center items-center h-full w-full relative gap-8 md:gap-24 p-8">
        
        <div class="flex flex-col items-center">
            <div class="flex items-baseline">
                <span id="current-price" class="text-[12rem] md:text-[14rem] font-black leading-none drop-shadow-2xl tracking-tighter">-.-</span>
            </div>
            <div class="text-4xl mt-2 font-bold opacity-90">p/kWh</div>
            <div id="last-updated" class="text-sm mt-4 opacity-75">Last Updated: --:--</div>
        </div>

        <div class="flex flex-col items-center md:items-start gap-4">
            <div class="text-2xl md:text-3xl font-medium bg-black/10 px-6 py-4 rounded-xl backdrop-blur-sm shadow-sm">
                Next: <span id="next-price" class="font-bold">--</span> p <span class="text-lg opacity-80">at <span id="next-time">--:--</span></span>
            </div>
            <div class="text-xl md:text-2xl font-medium bg-black/10 px-6 py-4 rounded-xl backdrop-blur-sm shadow-sm">
                Cheapest Slot: <span id="cheapest-slot" class="font-bold">--:--</span>
            </div>
        </div>

        <button id="refresh-btn" class="absolute top-6 right-6 opacity-40 hover:opacity-100 transition-opacity bg-black/20 px-4 py-2 rounded-full backdrop-blur-sm text-sm font-medium flex items-center gap-2 cursor-pointer z-50 text-shadow-none" onclick="fetchData()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
            Refresh
        </button>

        <button id="reset-btn" class="absolute bottom-6 right-6 opacity-20 hover:opacity-100 text-xs text-shadow-none">⚙️ Reset</button>

    </div>

    <script src="app.js"></script>
</body>
</html>
